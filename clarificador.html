<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LifeStrategics | Clarificador de Proyectos</title>
<meta name="theme-color" content="#1A1A1D">
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   LIFESTRATEGICS V2026 — PROJECT CLARIFIER
   Dark Mode · Glassmorphism · Mobile-first
   ═══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#1A1A1D; color:#fff;
  font-family:'Wix Madefor Display',sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased;
  height:100vh; overflow:hidden;
  display:flex; flex-direction:column;
}

:root {
  --blue: #58AFCD;
  --gold: #C5A149;
  --red-ls: #D15152;
  --green: #41EAD4;
  --card-bg: rgba(255,255,255,0.03);
  --glass: rgba(20,20,22,0.8);
}

/* ── HEADER ── */
header {
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: var(--glass);
  backdrop-filter: blur(10px);
  z-index: 10;
}
header h1 {
  font-family: 'DM Mono', monospace;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
  color: #fff;
}
.progress-container {
  max-width: 400px;
  margin: 10px auto 0;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--blue);
  transition: width 0.3s ease;
}

/* ── MAIN PLAY AREA ── */
main {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
}

/* ── CARDS ── */
.card-stack {
  position: relative;
  width: 100%;
  max-width: 340px;
  height: 400px;
  perspective: 1000px;
}
.card {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #242426;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
  will-change: transform, opacity;
  z-index: 1;
}
.card.active {
  z-index: 3;
}
.card.next {
  z-index: 2;
  transform: translateY(15px) scale(0.95);
  opacity: 0.6;
}
.card.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(30px) scale(0.9);
}

.card-category {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 20px;
}
.card-text {
  font-size: 1.6rem;
  font-weight: 500;
  line-height: 1.3;
  color: #fff;
}

/* ── CONTROLS ── */
.controls {
  padding: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
  background: var(--glass);
  border-top: 1px solid rgba(255,255,255,0.05);
  z-index: 10;
}
.btn {
  flex: 1;
  max-width: 120px;
  padding: 15px 0;
  border-radius: 12px;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  transition: transform 0.1s, background 0.2s;
}
.btn:active { transform: scale(0.95); }
.btn-no { border-top: 3px solid var(--red-ls); }
.btn-maybe { border-top: 3px solid var(--gold); }
.btn-yes { border-top: 3px solid var(--green); background: rgba(65, 234, 212, 0.05); }

/* Animations for swiping */
.swipe-left { transform: translateX(-150%) rotate(-15deg) !important; opacity: 0 !important; }
.swipe-right { transform: translateX(150%) rotate(15deg) !important; opacity: 0 !important; }
.swipe-up { transform: translateY(-150%) !important; opacity: 0 !important; }

/* ── RESULTS SCREEN ── */
#results-screen {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg);
  z-index: 20;
  display: none;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px;
}
.results-header {
  text-align: center;
  padding: 30px 0;
}
.results-header h2 { font-size: 2rem; margin-bottom: 10px; }
.brief-container {
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
.brief-section {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
}
.brief-section h3 {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  color: var(--blue);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.brief-section ul {
  list-style: none;
}
.brief-section li {
  margin-bottom: 8px;
  padding-left: 20px;
  position: relative;
}
.brief-section li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--gold);
}
.empty-msg { color: rgba(255,255,255,0.4); font-style: italic; font-size: 0.9rem; }

#copyBtn {
  display: block;
  margin: 30px auto 50px;
  background: var(--blue);
  color: #000;
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  font-family: 'Wix Madefor Display', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  cursor: pointer;
}

</style>
</head>
<body>

<header>
  <h1 id="progress-text">Clarificador - 1 / 42</h1>
  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</header>

<main>
  <div class="card-stack" id="card-stack">
    <!-- JS injected cards -->
  </div>
</main>

<div class="controls" id="controls">
  <button class="btn btn-no" onclick="handleChoice('no')">DESCARTAR</button>
  <button class="btn btn-maybe" onclick="handleChoice('maybe')">FASE 2</button>
  <button class="btn btn-yes" onclick="handleChoice('yes')">CRÍTICO</button>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen">
  <div class="results-header">
    <h2>Tu Brief Generado</h2>
    <p style="color: rgba(255,255,255,0.7);">Basado estrictamente en lo que priorizaste como CRÍTICO.</p>
  </div>
  <div class="brief-container" id="brief-rendered">
    <!-- JS injected brief -->
  </div>
  <button id="copyBtn" onclick="copyBrief()">Copiar Brief al Portapapeles</button>
</div>

<script>
const rawCards = [
  // 1. Target
  { category: 'Target', text: 'Equipos remotos / Home office' },
  { category: 'Target', text: 'Corporativos B2B tradicionales' },
  { category: 'Target', text: 'PyMEs sin presupuesto técnico' },
  { category: 'Target', text: 'Líderes de RRHH y Cultura' },
  { category: 'Target', text: 'Freelancers / Solopreneurs' },
  { category: 'Target', text: 'Directores de Innovación' },
  // 2. Problema
  { category: 'Dolor', text: 'Pérdida de tiempo en flujos manuales' },
  { category: 'Dolor', text: 'Dificultad para desconectar del trabajo (Burnout)' },
  { category: 'Dolor', text: 'Poca adopción de herramientas internas' },
  { category: 'Dolor', text: 'Silos de información desorganizada' },
  { category: 'Dolor', text: 'Alta rotación de talento' },
  { category: 'Dolor', text: 'Fricción en el proceso de ventas' },
  // 3. Propuesta 
  { category: 'Propuesta', text: 'Fricción cero en el día a día' },
  { category: 'Propuesta', text: 'Agilizar la toma de decisiones con IA' },
  { category: 'Propuesta', text: 'Acelerar el Onboarding de nuevos empleados' },
  { category: 'Propuesta', text: 'Cierre mental de la jornada al 100%' },
  { category: 'Propuesta', text: 'Unificar 5 herramientas en una sola vista' },
  { category: 'Propuesta', text: 'Reducción drástica de costos operativos' },
  // 4. Funcionalidades
  { category: 'Feature', text: 'Asistente de IA (Chatbot)' },
  { category: 'Feature', text: 'Dashboard de Datos en tiempo real' },
  { category: 'Feature', text: 'Automatización de emails (Make/Zapier)' },
  { category: 'Feature', text: 'Aplicación Móvil Nativa' },
  { category: 'Feature', text: 'Botón físico / Hardware periférico' },
  { category: 'Feature', text: 'Integración silenciosa con Slack/Teams' },
  // 5. ROI
  { category: 'Métrica', text: 'Ahorro de +10 horas semanales por persona' },
  { category: 'Métrica', text: 'Aumento del 20% en ticket promedio' },
  { category: 'Métrica', text: 'Mejora en calidad de sueño reportada por HR' },
  { category: 'Métrica', text: 'Reducción del Opex corporativo en un 15%' },
  { category: 'Métrica', text: 'Incremento del Employee Net Promoter Score' },
  { category: 'Métrica', text: 'Conversión de leads x3 en el primer trimestre' },
  // 6. Recursos
  { category: 'Recurso', text: 'Desarrollador Full Stack (1 mes)' },
  { category: 'Recurso', text: 'Licencias API de OpenAI / Claude' },
  { category: 'Recurso', text: 'Presupuesto de Ads para validación ($500)' },
  { category: 'Recurso', text: 'Soporte legal para manejo de datos CISO' },
  { category: 'Recurso', text: 'Diseñador UX/UI para la App' },
  { category: 'Recurso', text: 'Proveedor de manufactura de hardware' },
  // 7. Modelo
  { category: 'Modelo', text: 'SaaS Suscripción mensual / anual' },
  { category: 'Modelo', text: 'Freemium (Funciones básicas gratis)' },
  { category: 'Modelo', text: 'Ahorro Interno (Uso in-house ROI)' },
  { category: 'Modelo', text: 'Cobro por transacción (Fee)' },
  { category: 'Modelo', text: 'Venta consultiva Enterprise (Ticket alto)' },
  { category: 'Modelo', text: 'Venta de Hardware unitario' },
];

function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex !== 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

const cards = shuffle([...rawCards]);
let currentIndex = 0;
const results = { critico: [], fase2: [], descartado: [] };

const stackEl = document.getElementById('card-stack');
const progressText = document.getElementById('progress-text');
const progressBar = document.getElementById('progress-bar');
let cardElements = [];

function initCards() {
  // Render back to front
  for (let i = cards.length - 1; i >= 0; i--) {
    const c = cards[i];
    const el = document.createElement('div');
    el.className = 'card hidden';
    el.innerHTML = `
      <div class="card-category">${c.category}</div>
      <div class="card-text">${c.text}</div>
    `;
    stackEl.appendChild(el);
    cardElements.unshift(el); // keep array synced
  }
  updateView();
}

function updateView() {
  progressText.innerText = `Clarificador - ${Math.min(currentIndex + 1, cards.length)} / ${cards.length}`;
  progressBar.style.width = `${(currentIndex / cards.length) * 100}%`;

  if (currentIndex >= cards.length) {
    setTimeout(showResults, 400);
    return;
  }

  cardElements.forEach((el, i) => {
    el.className = 'card hidden';
    if (i === currentIndex) {
      el.className = 'card active';
    } else if (i === currentIndex + 1) {
      el.className = 'card next';
    }
  });
}

function handleChoice(type) {
  if (currentIndex >= cards.length) return;
  
  const currentEl = cardElements[currentIndex];
  
  if (type === 'no') {
    currentEl.classList.add('swipe-left');
    results.descartado.push(cards[currentIndex]);
  } else if (type === 'yes') {
    currentEl.classList.add('swipe-right');
    results.critico.push(cards[currentIndex]);
  } else if (type === 'maybe') {
    currentEl.classList.add('swipe-up');
    results.fase2.push(cards[currentIndex]);
  }
  
  currentIndex++;
  setTimeout(updateView, 150); // slight delay for visual pop
}

const briefStructure = [
  { id: 'Target', title: '1. Audiencia / Target' },
  { id: 'Dolor', title: '2. Problema a resolver' },
  { id: 'Propuesta', title: '3. Propuesta de Valor' },
  { id: 'Feature', title: '4. Magia (Features)' },
  { id: 'Métrica', title: '5. ROI Estimado / Métricas' },
  { id: 'Recurso', title: '6. Recursos Clave' },
  { id: 'Modelo', title: '7. Modelo de Negocio' },
];

function showResults() {
  document.getElementById('controls').style.display = 'none';
  document.querySelector('header').style.display = 'none';
  stackEl.style.display = 'none';
  
  const resScreen = document.getElementById('results-screen');
  resScreen.style.display = 'flex';
  
  const container = document.getElementById('brief-rendered');
  let html = '';
  
  briefStructure.forEach(section => {
    const items = results.critico.filter(c => c.category === section.id);
    html += `<div class="brief-section"><h3>${section.title}</h3>`;
    if (items.length > 0) {
      html += `<ul>${items.map(i => `<li>${i.text}</li>`).join('')}</ul>`;
    } else {
      // Intenta jalar una de Fase 2 si "Crítico" está vacío
      const itemsFase2 = results.fase2.filter(c => c.category === section.id);
      if (itemsFase2.length > 0) {
         html += `<ul>${itemsFase2.map(i => `<li>${i.text} <span style="color:#C5A149; font-size:0.7rem;">(Selección Fase 2)</span></li>`).join('')}</ul>`;
      } else {
         html += `<p class="empty-msg">No priorizaste cartas para este punto. Redáctalo manualmente.</p>`;
      }
    }
    html += `</div>`;
  });
  
  container.innerHTML = html;
}

function copyBrief() {
  let text = '--- TU BRIEF GENERADO ---\n\n';
  briefStructure.forEach(section => {
    const items = results.critico.filter(c => c.category === section.id);
    text += `${section.title}\n`;
    if (items.length > 0) {
      items.forEach(i => text += ` - ${i.text}\n`);
    } else {
      const itemsFase2 = results.fase2.filter(c => c.category === section.id);
      if(itemsFase2.length > 0) {
        itemsFase2.forEach(i => text += ` - ${i.text} (Fase 2)\n`);
      } else {
        text += ` - (Por definir)\n`;
      }
    }
    text += '\n';
  });
  
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerText = '¡Copiado al portapapeles!';
    btn.style.background = '#41EAD4';
    setTimeout(() => {
      btn.innerText = 'Copiar Brief al Portapapeles';
      btn.style.background = 'var(--blue)';
    }, 2000);
  });
}

// Start
initCards();
</script>
</body>
</html>
